<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Walkthrough</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a10;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* ── Stage ── */
.stage {
  width: 1200px;
  height: 750px;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  box-shadow: 0 40px 120px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
}

.camera {
  width: 100%;
  height: 100%;
  transform-origin: 50% 50%;
  transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}

/* ── Desktop backdrop ── */
.desktop {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, #0d0d1a 50%, #050510 100%);
  position: relative;
}

/* ── Claude Code window ── */
.cc-window {
  position: absolute;
  top: 32px;
  left: 48px;
  right: 48px;
  bottom: 32px;
  background: #1e1e2e;
  border-radius: 14px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.07),
    0 32px 80px rgba(0,0,0,0.8),
    0 2px 0 rgba(255,255,255,0.04) inset;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Titlebar ── */
.titlebar {
  height: 38px;
  background: #252535;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.tl { width: 12px; height: 12px; border-radius: 50%; }
.tl-r { background: #ff5f57; box-shadow: 0 0 4px rgba(255,95,87,0.5); }
.tl-y { background: #febc2e; box-shadow: 0 0 4px rgba(254,188,46,0.5); }
.tl-g { background: #28c840; box-shadow: 0 0 4px rgba(40,200,64,0.5); }

.titlebar-text {
  flex: 1;
  text-align: center;
  color: #585b70;
  font-size: 12.5px;
  letter-spacing: 0.01em;
}

/* ── Status bar ── */
.statusbar {
  height: 22px;
  background: linear-gradient(90deg, #7c3aed, #6d28d9);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 18px;
  flex-shrink: 0;
}

.sb-item {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 5px;
}

.sb-dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; }

/* ── Layout ── */
.cc-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 210px;
  background: #181824;
  border-right: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-label {
  padding: 14px 16px 8px;
  font-size: 10px;
  font-weight: 600;
  color: #45475a;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.session-row {
  padding: 9px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.15s;
}

.session-row.active {
  border-left-color: #a78bfa;
  background: rgba(167,139,250,0.08);
}

.session-row-name {
  font-size: 13px;
  color: #cdd6f4;
  font-weight: 500;
}

.session-row:not(.active) .session-row-name { color: #6c7086; }

.session-row-meta {
  font-size: 11px;
  color: #45475a;
  margin-top: 2px;
}

.sidebar-spacer { flex: 1; }

.new-session-btn {
  margin: 12px;
  padding: 8px 12px;
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.25);
  border-radius: 7px;
  color: #a78bfa;
  font-size: 12.5px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
}

/* ── Chat area ── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 28px 16px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  scrollbar-width: thin;
  scrollbar-color: #313244 transparent;
}

/* ── Messages ── */
.msg {
  display: flex;
  gap: 12px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.msg.show {
  opacity: 1;
  transform: translateY(0);
}

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  margin-top: 2px;
}

.av-user { background: linear-gradient(135deg, #89b4fa, #b4befe); color: #1e1e2e; }
.av-claude { background: linear-gradient(135deg, #f38ba8, #fab387); color: #1e1e2e; }

.msg-body { flex: 1; min-width: 0; }

.msg-name {
  font-size: 11.5px;
  font-weight: 600;
  color: #585b70;
  margin-bottom: 5px;
}

.msg-text {
  font-size: 13.5px;
  color: #cdd6f4;
  line-height: 1.65;
}

/* ── Tool calls ── */
.tool-call {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  background: rgba(166,227,161,0.06);
  border: 1px solid rgba(166,227,161,0.15);
  border-radius: 6px;
  font-size: 12px;
  color: #a6e3a1;
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  opacity: 0;
  transition: opacity 0.3s;
}

.tool-call.show { opacity: 1; }

.spinner {
  width: 11px;
  height: 11px;
  border: 1.5px solid rgba(166,227,161,0.25);
  border-top-color: #a6e3a1;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Plan card ── */
.plan-card {
  margin-top: 12px;
  background: #13131f;
  border: 1px solid rgba(167,139,250,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.plan-card-header {
  padding: 12px 16px;
  background: rgba(167,139,250,0.08);
  border-bottom: 1px solid rgba(167,139,250,0.15);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  font-weight: 600;
  color: #a78bfa;
}

.plan-step {
  padding: 10px 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.28s ease, transform 0.28s ease;
}

.plan-step:last-child { border-bottom: none; }
.plan-step.show { opacity: 1; transform: translateX(0); }

.step-num {
  min-width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(167,139,250,0.15);
  color: #a78bfa;
  font-size: 10.5px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  flex-shrink: 0;
}

.step-text {
  font-size: 12.5px;
  color: #bac2de;
  line-height: 1.5;
}

.step-text strong { color: #cdd6f4; font-weight: 600; }

/* ── Codex progress card ── */
.codex-card {
  margin-top: 12px;
  background: #13131f;
  border: 1px solid rgba(137,180,250,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.codex-card-header {
  padding: 12px 16px;
  background: rgba(137,180,250,0.06);
  border-bottom: 1px solid rgba(137,180,250,0.12);
  display: flex;
  align-items: center;
  gap: 10px;
}

.codex-icon {
  width: 26px;
  height: 26px;
  background: linear-gradient(135deg, #89b4fa, #a78bfa);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  color: #1e1e2e;
  flex-shrink: 0;
}

.codex-card-title { font-size: 13px; font-weight: 600; color: #cdd6f4; }
.codex-card-sub   { font-size: 11px; color: #585b70; margin-top: 1px; }

.file-row {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11.5px;
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  color: #a6e3a1;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.28s ease, transform 0.28s ease;
}

.file-row:last-child { border-bottom: none; }
.file-row.show { opacity: 1; transform: translateX(0); }
.file-row .fi { color: #585b70; font-size: 10px; }
.file-row.done-row { color: #cba6f7; }

/* ── Input area ── */
.input-area {
  padding: 14px 20px 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
  background: #1e1e2e;
}

.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: #13131f;
  border: 1px solid #313244;
  border-radius: 10px;
  padding: 11px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrap.focused {
  border-color: #a78bfa;
  box-shadow: 0 0 0 3px rgba(167,139,250,0.12);
}

.input-text {
  flex: 1;
  font-size: 13.5px;
  color: #cdd6f4;
  line-height: 1.4;
  min-height: 19px;
  word-break: break-word;
}

.cursor {
  display: inline-block;
  width: 2px;
  height: 15px;
  background: #a78bfa;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.send-btn {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  background: #a78bfa;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(167,139,250,0.35);
  transition: transform 0.1s;
}

/* ── Mouse cursor ── */
.mouse {
  position: absolute;
  pointer-events: none;
  z-index: 900;
  transition: left 0.45s cubic-bezier(0.4,0,0.2,1), top 0.45s cubic-bezier(0.4,0,0.2,1);
  filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7));
}

/* ── Click ripple ── */
.ripple {
  position: absolute;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid rgba(167,139,250,0.7);
  pointer-events: none;
  z-index: 899;
  animation: ripple-out 0.5s ease-out forwards;
}

@keyframes ripple-out {
  from { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  to   { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
}

/* ── Scene overlay ── */
.scene-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,16,0.82);
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 800;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
}

.scene-overlay.show { opacity: 1; }

.scene-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #a78bfa;
  margin-bottom: 10px;
}

.scene-title {
  font-size: 54px;
  font-weight: 800;
  color: #fff;
  text-align: center;
  line-height: 1.1;
  letter-spacing: -0.02em;
}

.scene-title .grad {
  background: linear-gradient(130deg, #a78bfa 0%, #89b4fa 60%, #94e2d5 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Progress bar ── */
.progress-track {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 200;
}

.prog-dot {
  height: 5px;
  border-radius: 3px;
  background: rgba(255,255,255,0.15);
  transition: width 0.4s ease, background 0.4s ease;
  width: 5px;
}

.prog-dot.active {
  width: 22px;
  background: #a78bfa;
}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="camera" id="camera">
    <div class="desktop">
      <div class="cc-window">

        <!-- Titlebar -->
        <div class="titlebar">
          <div class="tl tl-r"></div>
          <div class="tl tl-y"></div>
          <div class="tl tl-g"></div>
          <div class="titlebar-text">Claude Code — ~/projects/myapp</div>
        </div>

        <!-- Status bar -->
        <div class="statusbar">
          <div class="sb-item"><div class="sb-dot"></div> claude-sonnet-4-6</div>
          <div class="sb-item" id="sb-session">Session 1</div>
          <div class="sb-item" id="sb-cost">Direct control mode</div>
        </div>

        <!-- Body -->
        <div class="cc-body">

          <!-- Sidebar -->
          <div class="sidebar">
            <div class="sidebar-label">Sessions</div>
            <div class="session-row active" id="srow-1">
              <div class="session-row-name">Planning</div>
              <div class="session-row-meta">Just now</div>
            </div>
            <div class="session-row" id="srow-2" style="display:none">
              <div class="session-row-name">Implementation</div>
              <div class="session-row-meta">Just now</div>
            </div>
            <div class="sidebar-spacer"></div>
            <div class="new-session-btn" id="new-session-btn">+ New Session</div>
          </div>

          <!-- Session 1 -->
          <div class="chat-area" id="chat-1">
            <div class="messages" id="msgs-1"></div>
            <div class="input-area">
              <div class="input-wrap" id="iw-1">
                <div class="input-text" id="it-1"><span class="cursor"></span></div>
                <div class="send-btn">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <!-- Session 2 -->
          <div class="chat-area" id="chat-2" style="display:none">
            <div class="messages" id="msgs-2"></div>
            <div class="input-area">
              <div class="input-wrap" id="iw-2">
                <div class="input-text" id="it-2"><span class="cursor"></span></div>
                <div class="send-btn">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>

        </div><!-- cc-body -->
      </div><!-- cc-window -->
    </div><!-- desktop -->
  </div><!-- camera -->

  <!-- Mouse cursor -->
  <div class="mouse" id="mouse" style="left:600px;top:375px">
    <svg width="18" height="22" viewBox="0 0 18 22">
      <path d="M2 2L14 12L8.5 13.5L6.5 20L2 2Z" fill="white" stroke="rgba(0,0,0,0.4)" stroke-width="0.8"/>
    </svg>
  </div>

  <!-- Scene overlay -->
  <div class="scene-overlay" id="overlay">
    <div class="scene-eyebrow" id="eyebrow">Step 1</div>
    <div class="scene-title" id="stitle">Direct <span class="grad">Control</span></div>
  </div>

  <!-- Progress dots -->
  <div class="progress-track" id="prog-track">
    <div class="prog-dot active" id="pd0"></div>
    <div class="prog-dot" id="pd1"></div>
    <div class="prog-dot" id="pd2"></div>
    <div class="prog-dot" id="pd3"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── helpers ──────────────────────────────────────────────

function setDot(n) {
  for (let i = 0; i < 4; i++) {
    const d = $(`pd${i}`);
    if (d) d.className = 'prog-dot' + (i === n ? ' active' : '');
  }
}

async function scene(eyebrow, title, accentWord, ms = 2200) {
  const ov = $('overlay');
  $('eyebrow').textContent = eyebrow;
  const parts = title.split(accentWord);
  $('stitle').innerHTML = parts[0] + `<span class="grad">${accentWord}</span>` + (parts[1] || '');
  ov.classList.add('show');
  await sleep(ms);
  ov.classList.remove('show');
  await sleep(480);
}

async function moveMouse(x, y, ms = 460) {
  const m = $('mouse');
  m.style.transitionDuration = ms + 'ms';
  m.style.left = x + 'px';
  m.style.top  = y + 'px';
  await sleep(ms + 40);
}

function ripple(x, y) {
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  $('stage').appendChild(el);
  setTimeout(() => el.remove(), 550);
}

async function click(x, y) {
  await moveMouse(x, y, 400);
  await sleep(80);
  ripple(x, y);
  await sleep(180);
}

async function type(elId, text, speed = 58) {
  const el = $(elId);
  $(`iw-${elId.slice(-1)}`).classList.add('focused');
  let t = '';
  for (const ch of text) {
    t += ch;
    el.innerHTML = t + '<span class="cursor"></span>';
    await sleep(speed + Math.random() * 35 - 17);
  }
}

function clearInput(n) {
  $(`it-${n}`).innerHTML = '<span class="cursor"></span>';
  $(`iw-${n}`).classList.remove('focused');
}

function addMsg(containerN, role, name, html) {
  const c = $(`msgs-${containerN}`);
  const d = document.createElement('div');
  d.className = 'msg';
  d.innerHTML = `
    <div class="msg-avatar ${role === 'user' ? 'av-user' : 'av-claude'}">${role === 'user' ? 'U' : 'C'}</div>
    <div class="msg-body">
      <div class="msg-name">${name}</div>
      <div class="msg-text">${html}</div>
    </div>`;
  c.appendChild(d);
  requestAnimationFrame(() => d.classList.add('show'));
  c.scrollTop = c.scrollHeight;
  return d;
}

function addTool(containerN, text) {
  const c = $(`msgs-${containerN}`);
  const d = document.createElement('div');
  d.className = 'tool-call';
  d.innerHTML = `<div class="spinner"></div><span>${text}</span>`;
  c.appendChild(d);
  requestAnimationFrame(() => d.classList.add('show'));
  c.scrollTop = c.scrollHeight;
  return d;
}

function resolveTool(el, text) {
  el.innerHTML = `<span style="color:#a6e3a1">✓</span><span>${text}</span>`;
}

async function zoom(scale, ox = '50%', oy = '50%', ms = 800) {
  const cam = $('camera');
  cam.style.transition = `transform ${ms}ms cubic-bezier(0.4,0,0.2,1)`;
  cam.style.transformOrigin = `${ox} ${oy}`;
  cam.style.transform = `scale(${scale})`;
  await sleep(ms);
}

// ── Main sequence ─────────────────────────────────────────

async function demo() {

  // ═══ SCENE 0 — intro card ════════════════════════════
  setDot(0);
  await scene('Claude Code', 'Direct User Control', 'User Control', 2600);

  // Subtle zoom toward input
  await zoom(1.14, '50%', '88%', 900);
  await sleep(200);

  // Move cursor to input box 1 (input area bottom of window ≈ y 675)
  await moveMouse(560, 672, 550);
  await click(560, 672);

  // Type the request
  await type('it-1', "Let's make a plan: add OAuth2 login with Google", 56);
  await sleep(600);

  // Click send button (right edge of input row)
  await click(1030, 672);
  clearInput(1);

  // Show user message
  addMsg(1, 'user', 'You', "Let's make a plan: add OAuth2 login with Google");

  // Pull camera back slightly to see messages
  await zoom(1.06, '50%', '62%', 700);
  await sleep(300);

  // ═══ SCENE 1 — plan ══════════════════════════════════
  setDot(1);

  const t1 = addTool(1, 'Thinking…');
  await sleep(950);
  resolveTool(t1, 'Creating structured plan');
  await sleep(250);

  const claudeMsg = addMsg(1, 'claude', 'Claude',
    "Here's a 6-step implementation plan:");

  // Plan card
  const planCard = document.createElement('div');
  planCard.className = 'plan-card';
  planCard.innerHTML = `
    <div class="plan-card-header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="3" stroke="#a78bfa" stroke-width="2"/>
        <path d="M9 12l2 2 4-4" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Implementation Plan — OAuth2 Google Login
    </div>
    <div id="plan-steps"></div>`;
  claudeMsg.querySelector('.msg-body').appendChild(planCard);

  const steps = [
    ['Install dependencies',   'next-auth, @auth/prisma-adapter'],
    ['Configure NextAuth',      'Set up Google OAuth provider in <code>auth.config.ts</code>'],
    ['Prisma schema',           'Add User, Account &amp; Session models'],
    ['API handler',             'Wire up the catch-all auth route'],
    ['UI components',           'SignIn / SignOut buttons with session state'],
    ['Route protection',        'Middleware guards for authenticated pages'],
  ];

  const ps = $('plan-steps');
  for (let i = 0; i < steps.length; i++) {
    const [title, detail] = steps[i];
    const row = document.createElement('div');
    row.className = 'plan-step';
    row.innerHTML = `<div class="step-num">${i+1}</div>
      <div class="step-text"><strong>${title}</strong> — ${detail}</div>`;
    ps.appendChild(row);
    await sleep(190);
    requestAnimationFrame(() => row.classList.add('show'));
    await sleep(130);
    $('msgs-1').scrollTop = $('msgs-1').scrollHeight;
  }

  await sleep(1600);

  // ═══ SCENE 2 — new session ════════════════════════════
  setDot(2);
  await scene('Step 2', 'New Session → Implement', 'Implement', 2000);

  await zoom(1, '50%', '50%', 650);
  await sleep(200);

  // Hover + click New Session button (bottom of sidebar ≈ 110, 695)
  await moveMouse(110, 695, 650);
  await sleep(150);
  ripple(110, 695);
  await sleep(100);

  // Switch to session 2
  $('srow-2').style.display = 'block';
  $('srow-1').classList.remove('active');
  $('srow-2').classList.add('active');
  $('chat-1').style.display = 'none';
  $('chat-2').style.display = 'flex';
  $('sb-session').textContent = 'Session 2';
  $('sb-cost').textContent = 'Implementation mode';

  await sleep(350);

  // Zoom to input 2
  await zoom(1.13, '50%', '88%', 800);

  await moveMouse(540, 672, 500);
  await click(540, 672);

  await type('it-2', 'Implement plan using Codex', 64);
  await sleep(650);

  await click(1030, 672);
  clearInput(2);

  addMsg(2, 'user', 'You', 'Implement plan using Codex');

  await zoom(1.06, '50%', '60%', 650);

  // ═══ SCENE 3 — codex runs ════════════════════════════
  setDot(3);
  await sleep(300);

  const ta = addTool(2, 'Initializing Codex agent…');
  await sleep(750);
  resolveTool(ta, 'Codex agent ready');

  const tb = addTool(2, 'Loading plan — 6 tasks…');
  await sleep(550);
  resolveTool(tb, 'Plan loaded');

  const tc = addTool(2, 'Installing next-auth…');
  await sleep(800);
  resolveTool(tc, 'Dependencies installed');

  await sleep(200);

  const implMsg = addMsg(2, 'claude', 'Claude + Codex',
    'Running all 6 plan tasks in parallel:');

  // Codex card
  const codexCard = document.createElement('div');
  codexCard.className = 'codex-card';
  codexCard.innerHTML = `
    <div class="codex-card-header">
      <div class="codex-icon">Cx</div>
      <div>
        <div class="codex-card-title">Codex Implementation Agent</div>
        <div class="codex-card-sub">OAuth2 + Google Login · 6 tasks</div>
      </div>
    </div>
    <div id="file-rows"></div>`;
  implMsg.querySelector('.msg-body').appendChild(codexCard);

  const files = [
    { text: 'src/auth.config.ts',                         cls: '' },
    { text: 'src/lib/auth.ts',                             cls: '' },
    { text: 'prisma/schema.prisma  (updated)',             cls: '' },
    { text: 'src/components/AuthButtons.tsx',              cls: '' },
    { text: 'src/middleware.ts',                           cls: '' },
    { text: '✓  All 6 tasks complete — tests passing',    cls: 'done-row' },
  ];

  const fr = $('file-rows');
  for (const f of files) {
    const row = document.createElement('div');
    row.className = `file-row ${f.cls}`;
    row.innerHTML = `<span class="fi">›</span>${f.text}`;
    fr.appendChild(row);
    await sleep(380);
    requestAnimationFrame(() => row.classList.add('show'));
    $('msgs-2').scrollTop = $('msgs-2').scrollHeight;
  }

  await sleep(500);

  addMsg(2, 'claude', 'Claude + Codex',
    '✅ Done! OAuth2 Google login is implemented. Run <code style="background:#11111b;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:11.5px">prisma db push</code> then add your Google client credentials to <code style="background:#11111b;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:11.5px">.env.local</code>.');

  $('msgs-2').scrollTop = $('msgs-2').scrollHeight;

  await zoom(1, '50%', '50%', 1100);
  await sleep(2200);

  // ── loop reset ─────────────────────────────────────────
  const stage = $('stage');
  stage.style.transition = 'opacity 0.9s';
  stage.style.opacity = '0';
  await sleep(950);

  // Hard reset
  $('msgs-1').innerHTML = '';
  $('msgs-2').innerHTML = '';
  clearInput(1); clearInput(2);
  $('srow-1').classList.add('active');
  $('srow-2').classList.remove('active');
  $('srow-2').style.display = 'none';
  $('chat-1').style.display = 'flex';
  $('chat-2').style.display = 'none';
  $('sb-session').textContent = 'Session 1';
  $('sb-cost').textContent = 'Direct control mode';

  const cam = $('camera');
  cam.style.transition = 'none';
  cam.style.transform = 'scale(1)';
  cam.style.transformOrigin = '50% 50%';

  const m = $('mouse');
  m.style.transitionDuration = '0ms';
  m.style.left = '600px';
  m.style.top  = '375px';

  setDot(0);

  stage.style.opacity = '1';
  await sleep(400);

  demo(); // loop
}

demo();
</script>
</body>
</html>
